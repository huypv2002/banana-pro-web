<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🍌 Banana Pro – Tạo Ảnh AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f13; --surface: #1a1a24; --surface2: #22222f;
      --border: #2e2e42; --accent: #7c6af7; --accent2: #a78bfa;
      --text: #e2e2f0; --muted: #7878a0; --success: #34d399;
      --error: #f87171; --radius: 12px;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
    header { padding: 16px 28px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
    header h1 { font-size: 1.3rem; font-weight: 700; }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px 20px; width: 100%; flex: 1; display: grid; grid-template-columns: 400px 1fr; gap: 20px; align-items: start; }
    @media (max-width: 800px) { .container { grid-template-columns: 1fr; } }
    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; display: flex; flex-direction: column; gap: 16px; }
    label { font-size: 0.8rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; display: block; margin-bottom: 5px; }
    input, textarea, select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 9px 12px; font-size: 0.88rem; outline: none; transition: border-color .2s; }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); }
    textarea { resize: vertical; font-family: inherit; }
    .row { display: flex; gap: 10px; }
    .row > * { flex: 1; }
    button { cursor: pointer; border: none; border-radius: 8px; font-weight: 600; font-size: 0.88rem; padding: 10px 18px; transition: opacity .2s, transform .1s; }
    button:active { transform: scale(.98); }
    button:disabled { opacity: .4; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; width: 100%; }
    .btn-primary:hover:not(:disabled) { opacity: .88; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-danger { background: #3d1f1f; color: var(--error); border: 1px solid #5a2a2a; }

    /* Tabs */
    .tabs { display: flex; gap: 4px; background: var(--surface2); border-radius: 8px; padding: 4px; }
    .tab { flex: 1; padding: 8px; text-align: center; border-radius: 6px; cursor: pointer; font-size: 0.82rem; font-weight: 600; color: var(--muted); transition: all .2s; border: none; background: none; }
    .tab.active { background: var(--accent); color: #fff; }

    /* File input */
    .file-row { display: flex; gap: 8px; align-items: center; }
    .file-row input { flex: 1; }
    .file-row button { flex-shrink: 0; padding: 9px 14px; }

    /* Image-to-Image section */
    .ref-section { display: none; flex-direction: column; gap: 10px; }
    .ref-section.visible { display: flex; }
    .ref-label { font-size: 0.78rem; color: var(--muted); padding: 6px 10px; background: var(--surface2); border-radius: 6px; border: 1px dashed var(--border); }

    /* Progress */
    .progress-wrap { display: none; flex-direction: column; gap: 6px; }
    .progress-wrap.visible { display: flex; }
    .progress-bar-bg { background: var(--surface2); border-radius: 99px; height: 6px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 99px; transition: width .4s ease; width: 0%; }
    .progress-text { font-size: 0.8rem; color: var(--muted); }

    /* Badge */
    .badge { display: inline-block; padding: 2px 9px; border-radius: 99px; font-size: 0.72rem; font-weight: 700; }
    .badge-pending { background: #2a2a1a; color: #facc15; }
    .badge-running { background: #1a2a3a; color: #60a5fa; }
    .badge-done { background: #1a3a2a; color: var(--success); }
    .badge-error { background: #3a1a1a; color: var(--error); }

    /* Results */
    .results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .results-header h2 { font-size: 0.95rem; font-weight: 700; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; display: flex; flex-direction: column; }
    .card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; background: var(--surface2); }
    .card-body { padding: 8px 10px; }
    .card-prompt { font-size: 0.75rem; color: var(--muted); overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .card-error { font-size: 0.75rem; color: var(--error); padding: 8px 10px; }
    .card-actions { padding: 6px 10px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
    .card-actions a { font-size: 0.75rem; color: var(--accent2); text-decoration: none; }
    .card-actions a:hover { text-decoration: underline; }
    .empty-state { text-align: center; padding: 50px 20px; color: var(--muted); }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 10px; }
    .error-msg { background: #3a1a1a; border: 1px solid #5a2a2a; border-radius: 8px; padding: 10px 14px; color: var(--error); font-size: 0.83rem; }
    .cookie-help { background: #1a1f2e; border: 1px solid #2a3050; border-radius: 8px; padding: 10px 12px; font-size: 0.78rem; color: #8899cc; line-height: 1.6; }
    .cookie-help a { color: var(--accent2); }
    .hint { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }
  </style>
</head>
<body>
<header>
  <span>🍌</span>
  <h1>Banana Pro – Tạo Ảnh AI</h1>
</header>

<div class="container">
  <!-- LEFT: Controls -->
  <div class="panel">
    <!-- Cookie -->
    <div>
      <label>Cookie Google Labs</label>
      <textarea id="cookieInput" rows="4" placeholder="Dán cookie JSON từ Cookie Editor..."></textarea>
      <div class="cookie-help" style="margin-top:6px">
        Cài <a href="https://chrome.google.com/webstore/detail/cookie-editor/hlkenndednhfkekhgcdicdfddnkalmdm" target="_blank">Cookie Editor</a>
        → vào <a href="https://labs.google" target="_blank">labs.google</a> → Export → Copy
      </div>
    </div>

    <!-- Mode tabs -->
    <div>
      <label>Chế độ</label>
      <div class="tabs">
        <button class="tab active" onclick="setMode('txt')">📄 File TXT</button>
        <button class="tab" onclick="setMode('i2i')">🖼️ Image-to-Image</button>
        <button class="tab" onclick="setMode('folder')">📁 Folder Structure</button>
      </div>
    </div>

    <!-- TXT mode -->
    <div id="modeTxt">
      <label>File Prompts (.txt)</label>
      <div class="file-row">
        <input type="text" id="txtFilePath" readonly placeholder="Chọn file .txt (mỗi dòng 1 prompt)..." />
        <button class="btn-secondary" onclick="document.getElementById('txtFileInput').click()">Chọn</button>
        <input type="file" id="txtFileInput" accept=".txt" style="display:none" onchange="loadTxtFile(this)" />
      </div>
      <div class="hint" id="txtFileHint"></div>
    </div>

    <!-- Image-to-Image mode -->
    <div id="modeI2I" style="display:none">
      <label>File Prompts (.txt)</label>
      <div class="file-row">
        <input type="text" id="i2iTxtPath" readonly placeholder="File .txt chứa prompts..." />
        <button class="btn-secondary" onclick="document.getElementById('i2iFileInput').click()">Chọn</button>
        <input type="file" id="i2iFileInput" accept=".txt" style="display:none" onchange="loadI2IFile(this)" />
      </div>
      <div style="margin-top:10px">
        <label>Ảnh tham chiếu (Subject / Scene / Style)</label>
        <div style="display:flex;flex-direction:column;gap:6px;margin-top:4px">
          <div class="file-row">
            <input type="text" id="subjectImg" readonly placeholder="Subject image..." />
            <button class="btn-secondary" onclick="pickImg('subjectImg','subjectInput')">Chọn</button>
            <input type="file" id="subjectInput" accept="image/*" style="display:none" onchange="setImg('subjectImg',this)" />
          </div>
          <div class="file-row">
            <input type="text" id="sceneImg" readonly placeholder="Scene image (tùy chọn)..." />
            <button class="btn-secondary" onclick="pickImg('sceneImg','sceneInput')">Chọn</button>
            <input type="file" id="sceneInput" accept="image/*" style="display:none" onchange="setImg('sceneImg',this)" />
          </div>
          <div class="file-row">
            <input type="text" id="styleImg" readonly placeholder="Style image (tùy chọn)..." />
            <button class="btn-secondary" onclick="pickImg('styleImg','styleInput')">Chọn</button>
            <input type="file" id="styleInput" accept="image/*" style="display:none" onchange="setImg('styleImg',this)" />
          </div>
        </div>
      </div>
    </div>

    <!-- Folder Structure mode -->
    <div id="modeFolder" style="display:none">
      <label>Thư mục chứa prompts (.txt) + ảnh</label>
      <div class="file-row">
        <input type="text" id="folderTxtPath" readonly placeholder="Chọn thư mục..." />
        <button class="btn-secondary" onclick="document.getElementById('folderInput').click()">Chọn</button>
        <input type="file" id="folderInput" webkitdirectory style="display:none" onchange="loadFolder(this)" />
      </div>
      <div class="hint" id="folderHint"></div>
    </div>

    <!-- Settings -->
    <div class="row">
      <div>
        <label>Model</label>
        <select id="modelSelect">
          <option value="NARWHAL">Banana Pro 2</option>
          <option value="GEM_PIX_2">Banana Pro</option>
          <option value="GEM_PIX">Gem Pix</option>
          <option value="IMAGEN_3_5">Imagen 4</option>
        </select>
      </div>
      <div>
        <label>Tỉ lệ</label>
        <select id="aspectSelect">
          <option value="16:9">16:9</option>
          <option value="9:16">9:16</option>
          <option value="1:1">1:1</option>
          <option value="4:3">4:3</option>
          <option value="3:4">3:4</option>
        </select>
      </div>
      <div>
        <label>Số ảnh/prompt</label>
        <input type="number" id="variantsInput" value="1" min="1" max="4" />
      </div>
    </div>

    <button class="btn-primary" id="generateBtn" onclick="startGeneration()">✨ Tạo Ảnh</button>
    <button class="btn-danger" id="stopBtn" onclick="stopGeneration()" style="display:none">⏹ Dừng</button>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">Đang khởi động...</div>
    </div>
    <div id="errorMsg" class="error-msg" style="display:none"></div>
  </div>

  <!-- RIGHT: Results -->
  <div>
    <div class="results-header">
      <h2>Kết quả <span id="statusBadge"></span></h2>
      <button onclick="clearResults()" class="btn-secondary" style="font-size:0.78rem;padding:5px 12px">🗑 Xóa</button>
    </div>
    <div id="resultsGrid" class="grid">
      <div class="empty-state"><div class="icon">🖼️</div><div>Ảnh sẽ hiển thị ở đây</div></div>
    </div>
  </div>
</div>

<script>
const API_BASE = "https://banana-pro-api.kh431248.workers.dev";

let currentMode = 'txt';
let currentJobId = null;
let pollInterval = null;
let loadedPrompts = [];       // từ file txt
let i2iPrompts = [];          // prompts cho i2i
let i2iImages = {};           // {subject, scene, style} base64
let folderPrompts = [];       // prompts từ folder
let folderImages = {};        // {promptName: [base64...]}

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['txt','i2i','folder'][i] === mode));
  document.getElementById('modeTxt').style.display = mode === 'txt' ? 'block' : 'none';
  document.getElementById('modeI2I').style.display = mode === 'i2i' ? 'block' : 'none';
  document.getElementById('modeFolder').style.display = mode === 'folder' ? 'block' : 'none';
}

// ── File TXT ──────────────────────────────────────────────────────────────────
function loadTxtFile(input) {
  const file = input.files[0];
  if (!file) return;
  document.getElementById('txtFilePath').value = file.name;
  const reader = new FileReader();
  reader.onload = e => {
    loadedPrompts = e.target.result.split('\n').map(s => s.trim()).filter(Boolean);
    document.getElementById('txtFileHint').textContent = `✅ ${loadedPrompts.length} prompts`;
  };
  reader.readAsText(file);
}

function loadI2IFile(input) {
  const file = input.files[0];
  if (!file) return;
  document.getElementById('i2iTxtPath').value = file.name;
  const reader = new FileReader();
  reader.onload = e => { i2iPrompts = e.target.result.split('\n').map(s => s.trim()).filter(Boolean); };
  reader.readAsText(file);
}

function pickImg(inputId, fileId) { document.getElementById(fileId).click(); }
function setImg(inputId, fileInput) {
  const file = fileInput.files[0];
  if (!file) return;
  document.getElementById(inputId).value = file.name;
  const key = inputId.replace('Img','');
  const reader = new FileReader();
  reader.onload = e => { i2iImages[key] = e.target.result; };
  reader.readAsDataURL(file);
}

function loadFolder(input) {
  const files = Array.from(input.files);
  const txtFiles = files.filter(f => f.name.endsWith('.txt'));
  const imgFiles = files.filter(f => /\.(jpg|jpeg|png|webp|gif)$/i.test(f.name));

  folderPrompts = [];
  folderImages = {};

  let loaded = 0;
  txtFiles.forEach(f => {
    const reader = new FileReader();
    reader.onload = e => {
      const lines = e.target.result.split('\n').map(s => s.trim()).filter(Boolean);
      folderPrompts.push(...lines);
      loaded++;
      if (loaded === txtFiles.length)
        document.getElementById('folderHint').textContent = `✅ ${folderPrompts.length} prompts, ${imgFiles.length} ảnh`;
    };
    reader.readAsText(f);
  });

  // Load images theo tên file (match với prompt)
  imgFiles.forEach(f => {
    const reader = new FileReader();
    reader.onload = e => {
      const name = f.name.replace(/\.[^.]+$/, '').toLowerCase();
      if (!folderImages[name]) folderImages[name] = [];
      folderImages[name].push(e.target.result);
    };
    reader.readAsDataURL(f);
  });

  if (txtFiles.length === 0)
    document.getElementById('folderHint').textContent = `⚠️ Không tìm thấy file .txt trong thư mục`;
}

// ── Generate ──────────────────────────────────────────────────────────────────
async function startGeneration() {
  const cookie = document.getElementById('cookieInput').value.trim();
  if (!cookie) return showError('Vui lòng nhập cookie.');

  let prompts = [];
  let reference_images = null;

  if (currentMode === 'txt') {
    prompts = loadedPrompts;
    if (!prompts.length) return showError('Vui lòng chọn file .txt có prompts.');
  } else if (currentMode === 'i2i') {
    prompts = i2iPrompts;
    if (!prompts.length) return showError('Vui lòng chọn file .txt có prompts.');
    reference_images = Object.values(i2iImages).filter(Boolean);
  } else if (currentMode === 'folder') {
    prompts = folderPrompts;
    if (!prompts.length) return showError('Vui lòng chọn thư mục có file .txt.');
  }

  const model = document.getElementById('modelSelect').value;
  const aspect_ratio = document.getElementById('aspectSelect').value;
  const variants = parseInt(document.getElementById('variantsInput').value) || 1;

  hideError();
  setLoading(true);
  clearResults();

  try {
    const body = { cookie, prompts, model, aspect_ratio, variants };
    if (reference_images && reference_images.length) body.reference_images = reference_images;
    if (currentMode === 'folder') body.folder_images = folderImages;

    const res = await fetch(`${API_BASE}/generate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.detail || `HTTP ${res.status}`); }
    const job = await res.json();
    currentJobId = job.job_id;
    updateProgress(job);
    startPolling();
  } catch(e) {
    showError('Lỗi kết nối backend: ' + e.message);
    setLoading(false);
  }
}

function startPolling() {
  pollInterval = setInterval(async () => {
    if (!currentJobId) return;
    try {
      const res = await fetch(`${API_BASE}/jobs/${currentJobId}`);
      if (!res.ok) return;
      const job = await res.json();
      updateProgress(job);
      renderImages(job.images);
      if (job.status === 'done' || job.status === 'error') {
        clearInterval(pollInterval);
        setLoading(false);
        if (job.status === 'error') showError(job.error || 'Có lỗi xảy ra.');
      }
    } catch(e) {}
  }, 2000);
}

async function stopGeneration() {
  if (!currentJobId) return;
  clearInterval(pollInterval);
  await fetch(`${API_BASE}/jobs/${currentJobId}`, { method: 'DELETE' }).catch(()=>{});
  setLoading(false);
  document.getElementById('progressText').textContent = 'Đã dừng.';
}

// ── UI ────────────────────────────────────────────────────────────────────────
function setLoading(on) {
  document.getElementById('generateBtn').disabled = on;
  document.getElementById('stopBtn').style.display = on ? 'block' : 'none';
  document.getElementById('progressWrap').classList.toggle('visible', on);
  if (!on) document.getElementById('stopBtn').style.display = 'none';
}

function updateProgress(job) {
  const pct = job.total > 0 ? Math.round((job.completed / job.total) * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${job.completed} / ${job.total} ảnh (${pct}%)`;
  const badge = document.getElementById('statusBadge');
  const labels = { pending:'Chờ', running:'Đang chạy', done:'Hoàn thành', error:'Lỗi' };
  badge.className = `badge badge-${job.status}`;
  badge.textContent = labels[job.status] || job.status;
}

function renderImages(images) {
  if (!images || !images.length) return;
  const grid = document.getElementById('resultsGrid');
  grid.innerHTML = '';
  images.forEach(img => {
    const card = document.createElement('div');
    card.className = 'card';
    if (img.url) {
      card.innerHTML = `
        <img src="${img.url}" alt="${esc(img.prompt)}" loading="lazy" onerror="this.style.display='none'" />
        <div class="card-body"><div class="card-prompt">${esc(img.prompt)}</div></div>
        <div class="card-actions">
          <a href="${img.url}" target="_blank" download>⬇ Tải</a>
          <a href="${img.url}" target="_blank">🔗 Mở</a>
        </div>`;
    } else {
      card.innerHTML = `<div class="card-error">❌ ${esc(img.error||'Thất bại')}</div><div class="card-body"><div class="card-prompt">${esc(img.prompt)}</div></div>`;
    }
    grid.appendChild(card);
  });
}

function clearResults() {
  document.getElementById('resultsGrid').innerHTML = '<div class="empty-state"><div class="icon">🖼️</div><div>Ảnh sẽ hiển thị ở đây</div></div>';
  document.getElementById('statusBadge').textContent = '';
  document.getElementById('statusBadge').className = 'badge';
}

function showError(msg) { const el = document.getElementById('errorMsg'); el.textContent = '⚠️ ' + msg; el.style.display = 'block'; }
function hideError() { document.getElementById('errorMsg').style.display = 'none'; }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
